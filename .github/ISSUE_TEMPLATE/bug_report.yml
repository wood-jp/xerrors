name: Bug report
description: Report incorrect or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues before opening a new one.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or sequence of steps that triggers the bug.
      placeholder: |
        err := xerrors.Extend(...)
        // expected X, got Y
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "go1.26.1"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: xerrors version
      placeholder: "vX.Y.Z or commit SHA"
    validations:
      required: true
