name: Actionlint

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  actionlint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Get changed workflow files
        id: changed-files
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891 # v47.0.1
        with:
          files: |
            .github/workflows/*.yml
            .github/workflows/*.yaml

      - name: Run actionlint on changed files
        if: github.event_name != 'workflow_dispatch' && steps.changed-files.outputs.any_changed == 'true'
        uses: docker://rhysd/actionlint@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f # v1.7.11
        with:
          args: ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run actionlint on all workflow files
        if: github.event_name == 'workflow_dispatch'
        uses: docker://rhysd/actionlint@sha256:6f03470d0152251d7f07f7c4dc019dbe7024c72cd952f839544c7798843efa8f # v1.7.11

      - name: Run zizmor on changed files
        if: github.event_name != 'workflow_dispatch' && steps.changed-files.outputs.any_changed == 'true'
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          args: ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run zizmor on all workflow files
        if: github.event_name == 'workflow_dispatch'
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
