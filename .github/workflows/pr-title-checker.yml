name: "PR Title Checker"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  pr-title-checker:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            docs
            chore
            build

# PR title format:
#     <type>(<scope>): <description>
#
# Where:
#     <type> is one of: feat, fix, refactor, test, docs, chore, build
#     <scope> is optional
#     <description> is required
#
# Examples:
#     feat(stacktrace): add frame filtering
#     fix: correct nil handling in Extend
